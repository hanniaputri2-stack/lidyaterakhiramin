<!DOCTYPE html>
   <html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!--=============== REMIXICONS ===============-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css" crossorigin="">

      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="assets/css/styles.css">

      <title>Login form - Bedimcode</title>
   </head>
   <body>
      <div class="login">
         <img src="assets/img/login-bg.png" alt="image" class="login__bg">

         <form id="loginForm" action="" class="login__form">
            <h1 class="login__title">Silahkan Login</h1>

            <div class="login__inputs">
               <div class="login__box">
                  <input type="text" id="username" placeholder="nama pengguna" required class="required">
                  <i class="ri-mail-fill"></i>
               </div>

               <div class="login__box">
                  <input type="password" id="password" placeholder="Password" required class="required">
                  <i class="ri-lock-2-fill"></i>
               </div>
            </div>

            <div class="login__check">
               <div class="login__check-box">
                  <input type="checkbox" class="login__check-input" id="user-check">
                  <label for="user-check" class="login__check-label">Remember me</label>
               </div>

               <a href="#" class="login__forgot">Forgot Password?</a>
            </div>

            <button type="submit" class="login__button">Masuk</button>

            <div class="login__register">
               Belum punya akun? <a href="register.html">Daftar</a>
            </div>
            <div id="alerBox" class="alert" style="display:none;"></div>
         </form>
      </div>
   <script src="js/login.js"></script>
   </body>
</html>
